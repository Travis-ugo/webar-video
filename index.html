<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First WebAR App</title>
  
  <!-- A-Frame and MindAR Libraries -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* Basic Page Styles */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      color: #ffffff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Make sure A-Frame scene covers the entire screen behind UI */
    #ar-scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    /* Simple Header Bar */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #1f2937;
      padding: 12px;
      text-align: center;
      box-sizing: border-box;
      z-index: 10;
      border-bottom: 2px solid #374151;
    }

    .header h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    /* Onboarding / Start Screen */
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(17, 24, 39, 0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .start-container {
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
    }

    .start-container h1 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #6366f1;
    }

    .start-container p {
      color: #9ca3af;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .start-btn {
      background-color: #6366f1;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
      transition: background-color 0.2s;
    }

    .start-btn:hover {
      background-color: #4f46e5;
    }

    /* Floating Status Text when scanning */
    #status-toast {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(31, 41, 55, 0.9);
      border: 1px solid #374151;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 10;
      pointer-events: none;
      display: none; /* hidden until started */
    }

    /* Dashed Scanning Box in center */
    #scan-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed #6366f1;
      border-radius: 16px;
      z-index: 10;
      pointer-events: none;
      display: none; /* hidden until started */
    }

    /* Highlight border green when tracked */
    #scan-box.tracked {
      border-color: #10b981;
    }

    /* Restart Camera button in header */
    #refresh-button {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background-color: #374151;
      color: #ffffff;
      border: 1px solid #4b5563;
      padding: 6px 12px;
      font-size: 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      display: none; /* hidden until started */
      font-weight: bold;
      z-index: 15;
    }

    #refresh-button:hover {
      background-color: #4b5563;
    }

    /* Floating Mute/Unmute button (Instagram-style) */
    #mute-button {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background-color: rgba(0, 0, 0, 0.6);
      border: none;
      color: #ffffff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: none; /* hidden until started */
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 15;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
    }

    #mute-button:hover {
      background-color: rgba(0, 0, 0, 0.8);
      transform: scale(1.08);
    }

    #mute-button:active {
      transform: scale(0.92);
    }

    /* Instagram-style sound flash animation in center of screen */
    #sound-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background-color: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease-out, transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #sound-flash.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>

  <!-- 1. Start Screen Overlay -->
  <div id="start-screen">
    <div class="start-container">
      <h1>WebAR Video Player</h1>
      <p>Welcome! Tap the button below, allow camera permissions, and point your camera at the target card image.</p>
      <button class="start-btn" id="start-button">Start Camera</button>
    </div>
  </div>

  <!-- 2. Header Status -->
  <div class="header">
    <h2 id="header-status">WebAR Scanner</h2>
    <button id="refresh-button">Restart Camera</button>
  </div>

  <!-- 3. Visual Scanner Box -->
  <div id="scan-box"></div>

  <!-- 4. Instruction Toast -->
  <div id="status-toast">Align card inside the frame</div>

  <!-- Mute/Unmute floating button -->
  <button id="mute-button" aria-label="Mute / Unmute video">
    <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <!-- Instagram-style sound flash overlay -->
  <div id="sound-flash" aria-hidden="true">
    <svg id="sound-flash-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </div>

  <!-- 5. A-Frame AR Scene -->
  <a-scene 
    id="ar-scene"
    mindar-image="imageTargetSrc: assets/card.mind; autoStart: false; filterMinCF:0.0001; filterBeta:0.001; uiScanning: no;" 
    embedded 
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    
    <a-assets>
      <!-- The video asset we want to show on the target card -->
      <video id="ar-video" src="assets/video.mp4" preload="auto" autoplay loop muted playsinline webkit-playsinline></video>
    </a-assets>

    <!-- Camera -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Target Entity index 0 -->
    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-video src="#ar-video" position="0 0 0" rotation="0 0 0" width="1.4" height="0.7875" scale="1.2 1.2 1"></a-video>
    </a-entity>

  </a-scene>

  <!-- 6. Control Scripts -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const startScreen = document.getElementById("start-screen");
      const startButton = document.getElementById("start-button");
      const refreshButton = document.getElementById("refresh-button");
      const muteButton = document.getElementById("mute-button");
      const muteIcon = document.getElementById("mute-icon");
      const soundFlash = document.getElementById("sound-flash");
      const soundFlashIcon = document.getElementById("sound-flash-icon");
      const headerStatus = document.getElementById("header-status");
      const scanBox = document.getElementById("scan-box");
      const statusToast = document.getElementById("status-toast");

      const arScene = document.getElementById("ar-scene");
      const arTarget = document.getElementById("ar-target");
      const arVideo = document.getElementById("ar-video");

      // Force video pause on initial load
      try {
        arVideo.pause();
      } catch (e) {
        console.log("Initial video pause error:", e);
      }

      // Helper function to start AR scanner and UI elements
      const startARScanner = () => {
        // Hide start screen
        startScreen.style.display = "none";

        // Show scanner overlays and control buttons
        scanBox.style.display = "block";
        statusToast.style.display = "block";
        refreshButton.style.display = "block";
        muteButton.style.display = "flex";
        headerStatus.textContent = "Scanning for target...";

        // Set local storage/session storage to remember auto-start state on refresh
        sessionStorage.setItem("ar_autostart", "true");

        // Start MindAR Engine
        const arSystem = arScene.systems["mindar-image-system"];
        if (arSystem) {
          arSystem.start();
        }

        // Prime the video player to unlock playback on mobile devices
        arVideo.play().then(() => {
          arVideo.pause();
        }).catch(err => {
          console.log("Initial video priming check:", err);
        });
      };

      // Function to toggle mute state and animate the center pop-up flash (Instagram-style)
      const toggleMuteState = () => {
        // Only allow sound changes if AR has started (onboarding is closed)
        if (startScreen.style.display !== "none") return;

        if (arVideo.muted) {
          arVideo.muted = false;
          
          // Update bottom-right mute button icon
          muteIcon.innerHTML = `
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          `;
          
          // Update center sound flash icon
          soundFlashIcon.innerHTML = `
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
          `;
        } else {
          arVideo.muted = true;
          
          // Update bottom-right mute button icon
          muteIcon.innerHTML = `
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          `;
          
          // Update center sound flash icon
          soundFlashIcon.innerHTML = `
            <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
            <line x1="23" y1="9" x2="17" y2="15"></line>
            <line x1="17" y1="9" x2="23" y2="15"></line>
          `;
        }

        // Trigger flash pop-up animation in center of screen
        soundFlash.classList.remove("show");
        void soundFlash.offsetWidth; // Force CSS reflow to restart animation
        soundFlash.classList.add("show");

        // Hide flash after 600ms
        setTimeout(() => {
          soundFlash.classList.remove("show");
        }, 600);
      };

      // Check if we should automatically start (e.g. after page refresh)
      if (sessionStorage.getItem("ar_autostart") === "true") {
        // Wait a tiny moment for A-Frame systems to load fully before launching
        setTimeout(() => {
          startARScanner();
        }, 500);
      }

      // When the user clicks the start button
      startButton.addEventListener("click", () => {
        startARScanner();
      });

      // Manual camera restart button - reloads page to guarantee a fresh camera context!
      refreshButton.addEventListener("click", () => {
        // Ensure autostart flag is set so the camera turns back on immediately after refresh
        sessionStorage.setItem("ar_autostart", "true");
        window.location.reload();
      });

      // Automatically refetch camera when tab focus is regained (switching tabs / locking phone)
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          // Only auto-restart if we already passed the start screen
          if (startScreen.style.display === "none") {
            console.log("Tab focus regained: refetching camera stream...");
            const arSystem = arScene.systems["mindar-image-system"];
            if (arSystem) {
              try {
                arSystem.stop();
              } catch (e) {
                console.log("Error stopping arSystem:", e);
              }
              setTimeout(() => {
                arSystem.start();
              }, 300);
            }
          }
        }
      });

      // Handle Mute/Unmute toggle click on floating button
      muteButton.addEventListener("click", (e) => {
        e.stopPropagation(); // Prevent duplicate toggle from body click
        toggleMuteState();
      });

      // Tap/click screen canvas to toggle mute state (like Instagram)
      document.body.addEventListener("click", (e) => {
        // Prevent click events on buttons or header from triggering the mute toggle
        if (
          e.target.closest("#refresh-button") || 
          e.target.closest("#start-screen") || 
          e.target.closest(".header") || 
          e.target.closest("#mute-button")
        ) {
          return;
        }
        toggleMuteState();
      });

      // Listen for target detected
      arTarget.addEventListener("targetFound", () => {
        headerStatus.textContent = "Target Tracked - Playing Video";
        headerStatus.style.color = "#10b981"; // green text
        scanBox.classList.add("tracked");
        statusToast.textContent = "Video playing";
        
        // Reset playback to start safely
        try {
          if (arVideo.readyState > 0) {
            arVideo.currentTime = 0;
          }
        } catch (e) {
          console.log("Could not reset currentTime:", e);
        }

        arVideo.play().catch(err => {
          console.log("Playback failed on targetFound:", err);
        });
      });

      // Listen for target lost
      arTarget.addEventListener("targetLost", () => {
        headerStatus.textContent = "Scanning for target...";
        headerStatus.style.color = "#ffffff"; // default white text
        scanBox.classList.remove("tracked");
        statusToast.textContent = "Align card inside the frame";
        arVideo.pause();
      });
    });
  </script>
</body>
</html>
