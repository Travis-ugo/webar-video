<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Edition: WebAR Live-Coding Sandbox</title>
  
  <!-- 
    TEACHER STEP 1: IMPORT CORE WEB LIBRARIES
    - A-Frame: WebGL 3D rendering wrapper (uses HTML tags for WebGL).
    - MindAR: Computer vision library that tracks target signatures.
  -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* 
      TEACHER STEP 2: PAGE OVERFLOWS & VIEWPORT LOCKS
      - Enable overflow-y: auto to allow native mobile pull-to-refresh.
      - Use fixed/absolute positioning on HUD elements to lock them on top of WebGL canvas.
    */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: transparent;
      color: #ffffff;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      overflow-y: auto; 
      -webkit-overflow-scrolling: touch;
    }

    #ar-scene {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: block;
    }

    /* Absolute floating header HUD */
    .header {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #1f2937;
      padding: 12px;
      text-align: center;
      box-sizing: border-box;
      z-index: 10;
      border-bottom: 2px solid #374151;
    }

    .header h2 {
      margin: 0;
      font-size: 1.1rem;
      letter-spacing: 1px;
    }

    /* Onboarding Screen (Solves Browser Autoplay blocks) */
    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(17, 24, 39, 0.95);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .start-container {
      background-color: #1f2937;
      border: 1px solid #374151;
      border-radius: 12px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
    }

    .start-container h1 {
      margin-top: 0;
      font-size: 1.6rem;
      color: #6366f1;
    }

    .start-container p {
      color: #9ca3af;
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .start-btn {
      background-color: #6366f1;
      color: #ffffff;
      border: none;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 15px;
      transition: background-color 0.2s;
    }

    .start-btn:hover {
      background-color: #4f46e5;
    }

    /* Bottom status feedback toast */
    #status-toast {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: rgba(31, 41, 55, 0.9);
      border: 1px solid #374151;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      z-index: 10;
      pointer-events: none;
      display: none;
      white-space: nowrap;
    }

    /* Dashed targeting frame */
    #scan-box {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 260px;
      height: 260px;
      border: 2px dashed #6366f1;
      border-radius: 16px;
      z-index: 10;
      pointer-events: none;
      display: none;
    }

    #scan-box.tracked {
      border-color: #10b981;
    }

    /* Instagram-Style Volume Buttons */
    #mute-button {
      position: absolute;
      bottom: 24px;
      right: 24px;
      background-color: rgba(0, 0, 0, 0.6);
      border: none;
      color: #ffffff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 15;
      transition: background-color 0.2s, transform 0.1s;
      outline: none;
    }

    #mute-button:hover {
      background-color: rgba(0, 0, 0, 0.8);
      transform: scale(1.08);
    }

    #mute-button:active {
      transform: scale(0.92);
    }

    /* Circular speaker status indicator */
    #sound-flash {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      background-color: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease-out, transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    #sound-flash.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>

  <!-- Onboarding screen block -->
  <div id="start-screen">
    <div class="start-container">
      <h1>WebAR Live Coding</h1>
      <p>Click start, grant camera permissions, and align target card in the frame guidelines.</p>
      <button class="start-btn" id="start-button">Start Camera</button>
    </div>
  </div>

  <!-- Header HUD status bar -->
  <div class="header">
    <h2 id="header-status">WebAR Demo Running</h2>
  </div>

  <!-- Dashed target box guide -->
  <div id="scan-box"></div>

  <!-- Status toast guide -->
  <div id="status-toast">Align card inside the frame</div>

  <!-- Mute floating indicator button -->
  <button id="mute-button" aria-label="Mute / Unmute video overlay">
    <svg id="mute-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </button>

  <!-- Large central popup overlay flashing speaker status -->
  <div id="sound-flash" aria-hidden="true">
    <svg id="sound-flash-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
      <line x1="23" y1="9" x2="17" y2="15"></line>
      <line x1="17" y1="9" x2="23" y2="15"></line>
    </svg>
  </div>

  <!-- 
    TEACHER STEP 3: MOUNT A-FRAME CONTAINER
    - autoStart: false. Halts tracker so browser permissions aren't requested on load.
    - filterMinCF & filterBeta: Controls sensor smoothing parameters.
  -->
  <a-scene 
    id="ar-scene"
    mindar-image="imageTargetSrc: assets/card.mind; autoStart: false; filterMinCF:0.0001; filterBeta:0.001; uiScanning: no;" 
    embedded 
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    
    <!-- 
      TEACHER STEP 4: PRELOAD MUTED ASSETS
      - playsinline webkit-playsinline: Locks video inline on iOS Safari (no native player popup).
      - muted loop: Required flags to bypass Chrome/Safari autoplay lockouts.
    -->
    <a-assets>
      <video id="ar-video" src="assets/video.mp4" preload="auto" autoplay loop muted playsinline webkit-playsinline></video>
    </a-assets>

    <!-- Camera element -->
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- 
      TEACHER STEP 5: COORDINATE TRACKING TARGET
      - targetIndex: 0. Maps to first compiled image inside card.mind.
      - <a-video>: Projects standard 2D flat video file onto target surface plane coordinates.
    -->
    <a-entity mindar-image-target="targetIndex: 0" id="ar-target">
      <a-video src="#ar-video" position="0 0 0" rotation="0 0 0" width="1.4" height="0.7875" scale="1.2 1.2 1"></a-video>
    </a-entity>

  </a-scene>

  <!-- LIVE CODING CONTROL LOGIC -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // TEACHER STEP 6: RETRIEVE DOM INTERFACE ELEMENTS
      const startScreen = document.getElementById("start-screen");
      const startButton = document.getElementById("start-button");
      const muteButton = document.getElementById("mute-button");
      const muteIcon = document.getElementById("mute-icon");
      const soundFlash = document.getElementById("sound-flash");
      const soundFlashIcon = document.getElementById("sound-flash-icon");
      const headerStatus = document.getElementById("header-status");
      const scanBox = document.getElementById("scan-box");
      const statusToast = document.getElementById("status-toast");

      // TEACHER STEP 7: RETRIEVE A-FRAME SCENE ELEMENTS
      const arScene = document.getElementById("ar-scene");
      const arTarget = document.getElementById("ar-target");
      const arVideo = document.getElementById("ar-video");

      // Pause playback initially to keep CPU and networking loops optimized
      try {
        arVideo.pause();
      } catch (e) {
        console.log("Initial video pause error:", e);
      }

      // SVG path constants for Instagram audio controls
      const SPEAKER_UNMUTED_SVG = `
        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
      `;

      const SPEAKER_MUTED_SVG = `
        <path d="M11 5L6 9H2v6h4l5 4V5z"></path>
        <line x1="23" y1="9" x2="17" y2="15"></line>
        <line x1="17" y1="9" x2="23" y2="15"></line>
      `;

      // TEACHER STEP 8: DECLARE SCANNER LAUNCH TRIGGER
      const startARScanner = () => {
        // Toggle HUD display modes
        startScreen.style.display = "none";
        scanBox.style.display = "block";
        statusToast.style.display = "block";
        muteButton.style.display = "flex";
        headerStatus.textContent = "Scanning for target...";

        // Set sessionStorage so reloads auto-run the scanner (avoids repeating onboarding taps)
        sessionStorage.setItem("ar_autostart", "true");

        // Fire up computer vision thread
        const arSystem = arScene.systems["mindar-image-system"];
        if (arSystem) {
          arSystem.start();
        }

        // UNLOCK AUDIO CONTEXT:
        // Priming the video player. Calling .play() followed immediately by .pause() inside the 
        // user's click gesture unlocks the device speaker context so we can programmatically play later.
        arVideo.play().then(() => {
          arVideo.pause();
        }).catch(err => {
          console.log("Video media priming blocked:", err);
        });
      };

      // TEACHER STEP 9: INSTAGRAM-STYLE MUTE CONTROLS
      const toggleMuteState = () => {
        if (startScreen.style.display !== "none") return; // Block clicks if onboarding screen is active

        if (arVideo.muted) {
          arVideo.muted = false;
          muteIcon.innerHTML = SPEAKER_UNMUTED_SVG;
          soundFlashIcon.innerHTML = SPEAKER_UNMUTED_SVG;
        } else {
          arVideo.muted = true;
          muteIcon.innerHTML = SPEAKER_MUTED_SVG;
          soundFlashIcon.innerHTML = SPEAKER_MUTED_SVG;
        }

        // Animate central feedback flash
        soundFlash.classList.remove("show");
        void soundFlash.offsetWidth; // Force DOM flow recalculation to reset CSS animation keyframes
        soundFlash.classList.add("show");

        setTimeout(() => {
          soundFlash.classList.remove("show");
        }, 600);
      };

      // TEACHER STEP 10: AUTO-START FLAG RESOLUTIONS (?autostart=true)
      const urlParams = new URLSearchParams(window.location.search);
      if (urlParams.get("autostart") === "true") {
        sessionStorage.setItem("ar_autostart", "true");
      }

      const runAutostart = () => {
        if (sessionStorage.getItem("ar_autostart") === "true") {
          startARScanner();
        }
      };

      // A-Frame Scene Load guard: make sure components exist in WebGL memory
      if (arScene.hasLoaded) {
        runAutostart();
      } else {
        arScene.addEventListener("loaded", runAutostart);
      }

      startButton.addEventListener("click", () => {
        startARScanner();
      });

      // TEACHER STEP 11: WEBCAM FOCUS RECOVERY (visibilitychange API)
      // Tab swaps and phone lock screens freeze mobile webcam streams.
      // We catch visibility changes, shut down frozen streams, and run arSystem.start() fresh.
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          if (startScreen.style.display === "none") {
            console.log("Tab focus regained: restarting camera threads...");
            const arSystem = arScene.systems["mindar-image-system"];
            if (arSystem) {
              try {
                arSystem.stop();
              } catch (e) {
                console.log("Tracker stop exception:", e);
              }
              // Short delay to let camera resources release before requesting a new feed
              setTimeout(() => {
                arSystem.start();
              }, 300);
            }
          }
        }
      });

      // Mute button handler
      muteButton.addEventListener("click", (e) => {
        e.stopPropagation(); // Avoid triggering page click listener
        toggleMuteState();
      });

      // Full screen tap gesture listener
      document.body.addEventListener("click", (e) => {
        if (
          e.target.closest("#start-screen") || 
          e.target.closest(".header") || 
          e.target.closest("#mute-button")
        ) {
          return;
        }
        toggleMuteState();
      });

      // TEACHER STEP 12: BIND COMPUTER VISION EVENT RECOGNITIONS
      
      // TARGET FOUND: Card matches anchors
      arTarget.addEventListener("targetFound", () => {
        headerStatus.textContent = "Target Tracked - Playing Video";
        headerStatus.style.color = "#10b981"; // change header font color to green
        scanBox.classList.add("tracked");
        statusToast.textContent = "Video playing";
        
        // Reset playback head to frame 0 for a clean start loop
        try {
          if (arVideo.readyState > 0) {
            arVideo.currentTime = 0;
          }
        } catch (e) {
          console.log("currentTime reset exception:", e);
        }

        arVideo.play().catch(err => {
          console.log("Video playback execution blocked:", err);
        });
      });

      // TARGET LOST: Card removed from lens path
      arTarget.addEventListener("targetLost", () => {
        headerStatus.textContent = "Scanning for target...";
        headerStatus.style.color = "#ffffff";
        scanBox.classList.remove("tracked");
        statusToast.textContent = "Align card inside the frame";
        arVideo.pause(); // Pause playback to stop GPU loops and keep mobile battery optimized
      });
    });
  </script>
</body>
</html>
